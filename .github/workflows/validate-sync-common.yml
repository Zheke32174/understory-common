name: Repair app containment migrator

on:
  pull_request:
    paths:
      - tools/apply-app-public-signing-containment.py
      - .github/workflows/validate-sync-common.yml

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'security/public-signing-containment-v1'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: security/public-signing-containment-v1
          fetch-depth: 1
          show-progress: false
      - name: Remove validator self-reference
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply-app-public-signing-containment.py')
          text = path.read_text()
          old = '''      - name: Confirm no publication authority
        run: |
          set -euo pipefail
          ! grep -R -E 'gh release|git push --force|contents: write|--clobber' .github/workflows
          git diff --check
'''
          if text.count(old) != 1:
              raise SystemExit(f'expected one redundant block, found {text.count(old)}')
          path.write_text(text.replace(old, ''))
          PY
          python -m py_compile tools/apply-app-public-signing-containment.py
          git diff --check
      - name: Commit migrator repair
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/apply-app-public-signing-containment.py
          git commit -m "Remove containment validator self-reference"
          git push origin HEAD:security/public-signing-containment-v1
