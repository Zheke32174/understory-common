name: Apply public signing containment

# One-shot draft-branch repair; self-removes after committing the bounded result.
on:
  push:
    branches: [security/public-signing-containment-v1]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: security/public-signing-containment-v1
          fetch-depth: 0
      - name: Apply bounded containment repair
        run: python tools/apply-public-signing-containment.py
      - name: Verify repair boundary
        run: |
          set -euo pipefail
          test ! -e keystore/debug.keystore
          python ci/validate-public-signing-boundary.py
          git diff --check
      - name: Commit and remove repair authority
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Contain public debug signing identity"
          git push origin HEAD:security/public-signing-containment-v1
